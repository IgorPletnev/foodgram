name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: igorpletnev/foodgram_backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: igorpletnev/foodgram_frontend:latest

      - name: Copy data files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "data/,infra/nginx.conf,infra/docker-compose.prod.yml,docs/"
          target: /home/${{ secrets.SERVER_USER }}/foodgram
          strip_components: 0

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/foodgram/infra
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # Ждём, пока backend запустится
            sleep 5
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            # Загрузка ингредиентов
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py load_ingredients
            # Создание тегов
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py shell -c "
from recipes.models import Tag
if not Tag.objects.exists():
    Tag(name='Завтрак', slug='breakfast', color='#E26C2D').save()
    Tag(name='Обед', slug='lunch', color='#49B64E').save()
    Tag(name='Ужин', slug='dinner', color='#8775D2').save()
    print('Tags created')
else:
    print('Tags already exist')
"